# PPA automated tests: lint for style, unit for fast feedback without a DB,
# integration for real Postgres + pgvector + CLI smoke (matches production stack).
name: test
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: python -m pytest archive_tests/ -v --tb=short -m "not integration and not slow"
        env:
          PPA_INDEX_DSN: "postgresql://unused:unused@localhost/unused"

  integration:
    runs-on: ubuntu-latest
    env:
      PPA_TEST_PG_DSN: postgresql://archive:archive@localhost:5432/archive
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: archive
          POSTGRES_USER: archive
          POSTGRES_PASSWORD: archive
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U archive"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Prepare CI vault
        run: |
          VAULT="${RUNNER_TEMP}/ppa-ci-vault"
          mkdir -p "$VAULT/People" "$VAULT/Finance" "$VAULT/Attachments" "$VAULT/_templates" "$VAULT/.obsidian" "$VAULT/_meta"
          echo '{}' > "$VAULT/_meta/identity-map.json"
          echo '{}' > "$VAULT/_meta/sync-state.json"
          echo "PPA_PATH=$VAULT" >> "$GITHUB_ENV"
      - name: Bootstrap and validate
        env:
          PPA_INDEX_DSN: postgresql://archive:archive@localhost:5432/archive
          PPA_INDEX_SCHEMA: archive_ci
          PPA_EMBEDDING_PROVIDER: hash
          PPA_EMBEDDING_MODEL: archive-hash-dev
          PPA_EMBEDDING_VERSION: "1"
        run: |
          python -m archive_cli bootstrap-postgres
          python -m archive_cli health
      - name: Run health check
        env:
          PPA_INDEX_DSN: postgresql://archive:archive@localhost:5432/archive
          PPA_INDEX_SCHEMA: archive_ci
          PPA_EMBEDDING_PROVIDER: hash
          PPA_EMBEDDING_MODEL: archive-hash-dev
          PPA_EMBEDDING_VERSION: "1"
          PPA_REBUILD_VERIFY_HASH: "1"
        run: python -m archive_cli health-check
      - name: Run pytest integration
        env:
          PPA_INDEX_DSN: postgresql://archive:archive@localhost:5432/archive
          PPA_INDEX_SCHEMA: archive_ci
          PPA_EMBEDDING_PROVIDER: hash
          PPA_EMBEDDING_MODEL: archive-hash-dev
          PPA_EMBEDDING_VERSION: "1"
        run: python -m pytest archive_tests/ -v --tb=short -m "integration"
      - name: CLI smoke test
        env:
          PPA_INDEX_DSN: postgresql://archive:archive@localhost:5432/archive
          PPA_INDEX_SCHEMA: archive_ci
          PPA_EMBEDDING_PROVIDER: hash
          PPA_EMBEDDING_MODEL: archive-hash-dev
          PPA_EMBEDDING_VERSION: "1"
        run: chmod +x scripts/ppa-smoke-test.sh && ./scripts/ppa-smoke-test.sh

  slice-verify:
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: archive
          POSTGRES_USER: archive
          POSTGRES_PASSWORD: archive
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U archive"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Prepare slice from fixtures
        run: |
          python -m archive_cli slice-seed --config archive_archive_tests/slice_config.json --output /tmp/ppa-test-slice --source-vault archive_archive_tests/fixtures
      - name: Bootstrap, rebuild, and verify
        env:
          PPA_INDEX_DSN: postgresql://archive:archive@localhost:5432/archive
          PPA_INDEX_SCHEMA: archive_ci_slice
          PPA_PATH: /tmp/ppa-test-slice
          PPA_EMBEDDING_PROVIDER: hash
          PPA_EMBEDDING_MODEL: archive-hash-dev
          PPA_EMBEDDING_VERSION: "1"
        run: |
          python -m archive_cli bootstrap-postgres
          python -m archive_cli rebuild-indexes
          python -m archive_cli health-check --manifest tests/slice_manifest_fixture.json --report-format both --report-dir /tmp/

  benchmark-nightly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: archive
          POSTGRES_USER: archive
          POSTGRES_PASSWORD: archive
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U archive"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Run 5% benchmark
        env:
          PPA_INDEX_DSN: postgresql://archive:archive@localhost:5432/archive
          PPA_EMBEDDING_PROVIDER: hash
          PPA_EMBEDDING_MODEL: archive-hash-dev
          PPA_EMBEDDING_VERSION: "1"
        run: python -m archive_cli benchmark --slice-percent 5 --output /tmp/bench-results/
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: /tmp/bench-results/

  deploy-gate:
    name: Deployment Gate
    needs: [lint, unit, integration]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -e ".[dev]"
      - name: Verify archive_cli importable
        run: python -c "import archive_cli; print('OK')"
      - name: Verify archive_crate built
        run: python -c "import archive_crate; print('OK')"
      - name: Verify Phase 9 commands exist
        run: |
          python -m archive_cli deploy --help
          python -m archive_cli latency-check --help
          python -m archive_cli health-check --help
          python -m archive_cli import-embedding-cache --help
          python -m archive_cli export-embedding-cache --help
      - name: Run Phase 9 unit tests
        run: |
          python -m pytest \
            archive_tests/test_postgres_guc_parity.py \
            archive_tests/test_deploy.py \
            archive_tests/test_latency_check.py \
            archive_tests/test_health_check_v2.py \
            archive_tests/test_restore_path.py \
            -v -m "not integration"
