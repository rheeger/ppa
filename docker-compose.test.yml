services:
  archive-postgres-test:
    image: pgvector/pgvector:pg17
    container_name: archive-pgvector-test
    environment:
      POSTGRES_DB: archive_test
      POSTGRES_USER: archive_test
      POSTGRES_PASSWORD: archive_test
    ports:
      - "127.0.0.1::5432"
    volumes:
      - ./postgres-test.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive_test -d archive_test"]
      interval: 5s
      timeout: 5s
      retries: 10
